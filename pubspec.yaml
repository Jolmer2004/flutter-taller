name: unicontrol_app
description: Aplicación móvil Flutter para la Universidad UCEVA.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── UI / Navegación ────────────────────────────────────────────────────
  cupertino_icons: ^1.0.5
  google_fonts: ^6.2.1
  go_router: ^14.0.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0

  # ── Estado ────────────────────────────────────────────────────────────
  provider: ^6.1.2

  # ── Backend original (Supabase + Google) ──────────────────────────────
  supabase_flutter: ^2.8.0
  google_sign_in: ^6.2.1

  # ── HTTP para login JWT propio ─────────────────────────────────────────
  http: ^1.2.2

  # ── Almacenamiento local ───────────────────────────────────────────────
  # Datos NO sensibles (nombre, email, tema, idioma, rol)
  shared_preferences: ^2.3.2
  # Datos SENSIBLES (access_token, refresh_token) — cifrados en Keychain/Keystore
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
